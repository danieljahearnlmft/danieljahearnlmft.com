[build]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/services-page"
  to = "/services"
  status = 301

[[redirects]]
  from = "/services-page/"
  to = "/services/"
  status = 301

[[redirects]]
  from = "/visualizations"
  to = "/visualization"
  status = 301

[[redirects]]
  from = "/visualizations/"
  to = "/visualization"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404
